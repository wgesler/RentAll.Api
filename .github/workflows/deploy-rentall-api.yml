name: Deploy rentall-api (Docker)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push Image to ACR
        run: |
          az acr build \
            --registry rentallacr7918 \
            --image rentall-api:latest \
            --file RentAll.Api/Dockerfile \
            .

      - name: Configure App Service to use image
        run: |
          az webapp config container set \
            --name rentall-api-linux \
            --resource-group rentall-api-linux_group \
            --docker-custom-image-name rentallacr7918.azurecr.io/rentall-api:latest

      - name: Restart App Service
        run: |
          az webapp restart \
            --name rentall-api-linux \
            --resource-group rentall-api-linux_group
